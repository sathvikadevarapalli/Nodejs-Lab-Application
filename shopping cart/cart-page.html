<!doctype html>
<html>
    <head>
        <title>checkout</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="top-bar">
            <h2>checkout</h2>
            <a href="cart-page.html" class="checkout">back to cart</a>
        </div>
        <div class="cart-container">
            <h3>order summary</h3>
            <div class="item">
                <p>headphones x 1</p>
                <p>₹999</p>
            </div>
            <div class="item">
            <p>smart watch x 2</p>
            <p>₹3998</p>
            </div>
            <hr>
            <h3>total: ₹4997</h3>
            <h3>delivery address</h3>
            <p> lb nagar,hyderabad,telangana</p>
            <h3>payment method</h3>
            <div class = "payment options">
                <label>
                    <input type = "radio" name = "payment" value="cod">
                    cash on delivery
                </label>
                <label>
                    <input type = "radio" name = "payment" value = "phonepay">
                    phone pay
                </label>
                <label>
                    <input type = "radio" name = "payment" value = "gpay">
                    google pay
                </label>
                <label>
                    <input type = "radio" name = "payment" value = "upi">
                    pay via upi
                </label>
            </div>
            <button class="pay-btn">place order</button>
            </div>
    </body>
</html>
